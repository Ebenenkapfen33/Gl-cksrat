<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bingo Glücksrad - Silben Edition</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            margin: 0;
        }

        /* Das ausgewählte Wort ganz groß oben */
        #result-display {
            height: 120px;
            font-size: 80px;
            font-weight: bold;
            margin: 20px 0;
            text-transform: uppercase;
        }

        #wheel-container {
            position: relative;
            margin-bottom: 30px;
        }

        #arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 45px solid black;
            z-index: 10;
        }

        canvas {
            border: 10px solid black; /* Schwarze Umrandung */
            border-radius: 50%;
            transition: transform 20s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .controls {
            background: #f0f0f0;
            padding: 15px;
            border: 2px solid black;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        textarea {
            width: 90%;
            height: 80px;
            font-size: 20px;
        }

        /* Silben-Farben für die Anzeige oben */
        .syl-blue { color: #0000FF; }
        .syl-red { color: #FF0000; }
    </style>
</head>
<body>

    <div id="result-display">DRÜCKE LEERTASTE</div>

    <div id="wheel-container">
        <div id="arrow"></div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <div class="controls">
        <p>Wörter mit Bindestrich trennen: <b>Hu-pe</b>, <b>Am-pel</b></p>
        <textarea id="wordsInput">Pa-pa
O-ma
Au-to
Schu-le
Win-ter</textarea>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const input = document.getElementById('wordsInput');
        const resultDiv = document.getElementById('result-display');
        
        let segments = [];
        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            segments = input.value.split('\n').filter(s => s.trim() !== "");
            const angleStep = (Math.PI * 2) / segments.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            segments.forEach((word, i) => {
                const angle = i * angleStep;
                
                // 1. Feld zeichnen (Weiß mit schwarzem Rand)
                ctx.beginPath();
                ctx.fillStyle = "white";
                ctx.moveTo(300, 300);
                ctx.arc(300, 300, 300, angle, angle + angleStep);
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = "black";
                ctx.stroke();

                // 2. Text mit farbigen Silben ins Rad malen
                ctx.save();
                ctx.translate(300, 300);
                ctx.rotate(angle + angleStep / 2);
                ctx.font = "bold 28px Arial";
                
                const parts = word.split('-');
                let currentX = 280; // Startposition vom Rand aus

                // Wir schreiben rückwärts vom Rand zur Mitte
                for (let j = parts.length - 1; j >= 0; j--) {
                    ctx.fillStyle = (j % 2 === 0) ? "blue" : "red";
                    const text = parts[j];
                    ctx.textAlign = "right";
                    ctx.fillText(text, currentX, 10);
                    currentX -= ctx.measureText(text).width + 5; // Abstand zur nächsten Silbe
                }
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            resultDiv.innerHTML = "???";
            
            const extraDegrees = 3600 + Math.floor(Math.random() * 360); 
            currentRotation += extraDegrees;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const actualRotation = currentRotation % 360;
                const segmentAngle = 360 / segments.length;
                const winningIndex = Math.floor(((360 - actualRotation + 270) % 360) / segmentAngle);
                
                // Gewinner-Wort oben farbig anzeigen
                const word = segments[winningIndex];
                const parts = word.split('-');
                resultDiv.innerHTML = parts.map((p, i) => 
                    `<span class="${i % 2 === 0 ? 'syl-blue' : 'syl-red'}">${p}</span>`
                ).join('');
            }, 20000); // Exakt 20 Sekunden Verzögerung
        }

        input.addEventListener('input', drawWheel);
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" && document.activeElement !== input) {
                e.preventDefault();
                spin();
            }
        });

        drawWheel();
    </script>
</body>
</html>
