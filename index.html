<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bingo Glücksrad - Ausbildung</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif; /* Oft besser lesbar für Kinder */
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f9f9f9;
            margin: 0;
            overflow-x: hidden;
        }

        /* Ergebnisanzeige oben */
        #result-display {
            height: 100px;
            font-size: 60px;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
            color: #333;
        }

        #wheel-container {
            position: relative;
            margin: 30px;
        }

        #arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 40px solid #000;
            z-index: 10;
        }

        canvas {
            border: 8px solid #000; /* Schwarze Umrandung des Rades */
            border-radius: 50%;
            transition: transform 20s cubic-bezier(0.1, 0, 0.1, 1); /* 20 Sek. Verzögerung */
        }

        .controls {
            background: #eee;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #000;
            width: 80%;
            max-width: 500px;
        }

        textarea {
            width: 100%;
            height: 80px;
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* Silben-Farben */
        .syl-1 { color: blue; }
        .syl-2 { color: red; }
    </style>
</head>
<body>

    <div id="result-display"></div>

    <div id="wheel-container">
        <div id="arrow"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <p>Wörter mit Bindestrich trennen (z.B. Hun-der-te):</p>
        <textarea id="wordsInput">Ap-fel
Bi-ne
Do-se
E-sel
Fen-ster</textarea>
        <p><small>Leertaste zum Drehen. (Die Drehung dauert 20s)</small></p>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const input = document.getElementById('wordsInput');
        const resultDiv = document.getElementById('result-display');
        
        let segments = [];
        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            segments = input.value.split('\n').filter(s => s.trim() !== "");
            if (segments.length === 0) return;

            const angleStep = (Math.PI * 2) / segments.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            segments.forEach((text, i) => {
                const angle = i * angleStep;
                
                // Segment-Hintergrund
                ctx.beginPath();
                ctx.fillStyle = "#fff";
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + angleStep);
                ctx.fill();
                
                // Schwarzer Rand für jedes Feld
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#000";
                ctx.stroke();

                // Text zeichnen (Silben-Logik für das Rad)
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + angleStep / 2);
                ctx.textAlign = "right";
                ctx.font = "bold 24px Arial";
                
                // Wir entfernen die Striche für das Rad, damit es sauber aussieht
                ctx.fillStyle = "#000";
                ctx.fillText(text.replace(/-/g, ""), 230, 10);
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning) return;
            
            isSpinning = true;
            resultDiv.innerHTML = "???"; // Spannung erzeugen
            
            const extraDegrees = Math.floor(Math.random() * 360) + 3600; // Viele Umdrehungen für 20s
            currentRotation += extraDegrees;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                showWinner();
            }, 20000); // 20 Sekunden warten
        }

        function showWinner() {
            // Berechnen welches Segment oben ist
            const actualRotation = currentRotation % 360;
            const segmentAngle = 360 / segments.length;
            // Der Zeiger ist oben (270 Grad im Canvas-System)
            const winningIndex = Math.floor(((360 - actualRotation + 270) % 360) / segmentAngle);
            const word = segments[winningIndex];

            // Silben farbig darstellen
            const parts = word.split('-');
            let coloredWord = "";
            parts.forEach((part, index) => {
                const colorClass = (index % 2 === 0) ? 'syl-1' : 'syl-2';
                coloredWord += `<span class="${colorClass}">${part}</span>`;
            });

            resultDiv.innerHTML = coloredWord;
        }

        input.addEventListener('input', drawWheel);
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" && document.activeElement !== input) {
                e.preventDefault();
                spin();
            }
        });

        drawWheel();
    </script>
</body>
</html>
